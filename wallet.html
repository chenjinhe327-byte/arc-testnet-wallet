<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC Wallet | HelloArcToken Testnet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }
    body {
      background: linear-gradient(160deg, #0B1120 0%, #0F172A 100%);
      color: #E2E8F0;
      min-height: 100vh;
      padding: 32px 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    .global-warning {
      background: #991B1B;
      padding: 12px 16px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      color: white;
    }
    .back-home {
      display: block;
      text-align: center;
      color: #25F398;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .back-home:hover {
      text-decoration: underline;
    }
    .card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      border: 1px solid #334155;
      transition: 0.2s ease;
    }
    .card:hover {
      border-color: #25F39866;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #25F398;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94A3B8;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .balance-wrap {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 12px 0;
    }
    .balance {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
    }
    .token-symbol {
      color: #25F398;
      font-size: 20px;
    }
    .label {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 8px;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s ease;
    }
    .btn-primary {
      background: #25F398;
      color: #020617;
    }
    .btn-primary:hover {
      background: #1AE089;
    }
    .btn-secondary {
      background: #334155;
      color: #fff;
    }
    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      background: #0F172A;
      border: 1px solid #475569;
      color: #fff;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #25F398;
    }
    #account {
      color: #25F398;
      font-size: 14px;
      margin: 12px 0;
      word-break: break-all;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="global-warning">
      ⚠️ Testnet Demo Only — No Real Funds Supported
    </div>
    <a href="./index.html" class="back-home">← Back to Official Homepage</a>

    <div class="card">
      <div class="title">ARC Visual Wallet</div>
      <div class="subtitle">Connect MetaMask to interact with Arc Testnet</div>
      <button class="btn btn-primary" onclick="connectMetaMask()">🔌 Connect MetaMask Wallet</button>
      <div id="account"></div>
    </div>

    <div class="card">
      <div class="title">Token Balance</div>
      <div class="balance-wrap">
        <div class="balance" id="balance">--</div>
        <div class="token-symbol">ARC</div>
      </div>
      <div style="color:#94A3B8;font-size:13px;">HelloArcToken ERC-20</div>
    </div>

    <div class="card">
      <div class="title">Transfer Token</div>
      <div class="subtitle">Send ARC to any wallet address on Arc Testnet</div>

      <div class="label">Recipient Wallet Address</div>
      <input id="to" placeholder="0xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">

      <div class="label">Amount (ARC)</div>
      <input id="amount" placeholder="e.g. 10.5">

      <button class="btn btn-primary" onclick="sendToken()">✅ Submit On-Chain Transfer</button>
    </div>
  </div>

  <!-- Ethers.js CDN -->
  <script src="https://cdn.ethers.org/lib/ethers-6.7.0.umd.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = "0x5916804cfd7db5ce08861732969f1861304d216a";
    const DECIMALS = 18;
    let provider, signer, address;
    const abi = [
      "function balanceOf(address) view returns (uint256)",
      "function transfer(address to, uint256 amount) returns (bool)"
    ];

    async function connectMetaMask() {
      if (!window.ethereum) {
        alert("MetaMask wallet extension is required, please install first.");
        return;
      }
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      address = await signer.getAddress();
      document.getElementById("account").innerText = "Connected Wallet: " + address;
      getBalance();
    }

    async function getBalance() {
      const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, provider);
      const bal = await contract.balanceOf(address);
      const formatted = ethers.formatUnits(bal, DECIMALS);
      document.getElementById("balance").innerText = formatted;
    }

    async function sendToken() {
      const to = document.getElementById("to").value.trim();
      const amount = document.getElementById("amount").value.trim();
      if (!to || !amount) {
        alert("Please fill recipient address and transfer amount.");
        return;
      }
      const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);
      const value = ethers.parseUnits(amount, DECIMALS);
      try {
        const tx = await contract.transfer(to, value);
        alert(`Transaction submitted!\nHash: ${tx.hash}\nCheck status on ArcScan.`);
        await tx.wait();
        alert("Transfer confirmed on Arc Testnet!");
        getBalance();
      } catch (e) {
        alert(`Transfer failed: ${e.message}`);
      }
    }
  </script>
</body>
</html>
